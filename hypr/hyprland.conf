################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor= eDP-1, 1920x1200@60, 0x0, 1.25

xwayland{
enabled=true
force_zero_scaling=true
}

#env = GDK_SCALE,2
env = GDK_BACKEND,wayland,x11

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun -config ~/.config/rofi/config.rasi

#################
### AUTOSTART ###
#################

exec-once = nm-applet & blueman-applet
exec-once = waybar
exec-once = swaync
exec-once = wl-gammarelay
exec-once = hyprpaper & hypridle
#exec-once = kitty --class cmatrix-lock -o window_padding_width=0 --override background=black cmatrix

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    col.active_border = rgba(FF73D0ee) rgba(90DDE9ee) 90deg
    col.inactive_border = rgba(FFFFFFaa)
    # Enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 0.9
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
	size = 4
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 3, overshot, slide  
   #animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 3, smoothOut, slide
   #animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3, smoothIn
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}
#dwindle {
#    pseudotile = true # Master switch for pseudotiling.
#    preserve_split = true # You probably want this
#}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false  
#    session_lock_xray = false  
#    uncomment to make hyprlock background transparent 
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, W, exec, rfkill unblock wifi 
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Controls wl-gammarelay for redlight filter
bind = $mainMod, U, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateTemperature n -500
bind = $mainMod, I, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateTemperature n +500

# Control hyprshot for screenshots 
bind = $mainMod, P, exec, ~/Documents/scripts/screenshot.sh
# Control hpyrlock for lockscreen
# bind = $mainMod, L, exec, /bin/cmatrix-lock.sh
bind = $mainMod, L, exec, hyprlock

# Launch Obsidian, the note-taking app
bind = $mainMod, O, exec, obsidian

# Fullscreen
bind = $mainMod, F, fullscreen

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a special workspace with mainMod + SHIFT + [key]
bind = $mainMod SHIFT, V, movetoworkspace, special:vm
bind = $mainMod SHIFT, O, movetoworkspace, special:obsidian

# Switch through existing workspaces one at a time
bind = $mainMod, code:60, workspace, +1 # code:60 is a period
bind = $mainMod, code:59, workspace, -1 # code:59 is a comma

# Move acting window across workspaces
bind = $mainMod SHIFT, code:60, movetoworkspace, +1 
bind = $mainMod SHIFT, code:59, movetoworkspace, -1 

# Shift active window across the screen
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Special workspaces for Spotify, Discord, etc.
bind = ALT, S, togglespecialworkspace, spotify
bind = ALT, D, togglespecialworkspace, discord
bind = ALT, W, togglespecialworkspace, wireshark
bind = ALT, A, togglespecialworkspace, arduino
bind = ALT, G, togglespecialworkspace, gns3
bind = ALT, V, togglespecialworkspace, vm
bind = ALT, O, togglespecialworkspace, obsidian

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Special workspace window rules, UPDATED FOR NEW VERSION
windowrule = match:class spotify, workspace special:spotify
windowrule = match:class de.shorsh.discord.screenaudio, workspace special:discord
windowrule = match:class org.wireshark.Wireshark, workspace special:wireshark
windowrule = match:class Arduino IDE, workspace special:arduino
windowrule = match:class gns3, workspace special:gns3
windowrule = match:class virt-manager, workspace special:vm
windowrule = match:class obsidian, workspace special:obsidian

#windowrule = match:class cmatrix-lock, fullscreen_state 3 
#windowrule = match:class cmatrix-lock, border_size 0
#windowrule = match:class cmatrix-lock, workspace special:cmatrix silent
#windowrule = match:class cmatrix-lock, no_anim on

windowrule = match:class xdg-desktop-portal-gtk, float on

# Removes the black border from hyprpaper screenshots
layerrule = no_anim on, match:class hyprpicker
layerrule = no_anim on, match:class selection

